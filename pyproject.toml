[tool.black]
line-length = 88
target-version = ["py39", "py310", "py311"]

[tool.isort]
profile = "black"
line_length = 88
known_third_party = [
    "numpy", "pandas", "scipy", "matplotlib", "plotly", "seaborn",
    "geopandas", "rasterio", "shapely", "fiona", "pyproj",
    "sklearn", "statsmodels",
    "reportlab", "jinja2", "PIL",
    "tqdm", "tabulate", "colorama",
]
